# ZED X Right Camera Config
# Mounted: right side of vehicle, facing right
# Namespace: /zed_right
# Serial: 47753729
# Status: hardware fault — disabled by default (use_zed_right:=false)

zed_node:
  ros__parameters:
    camera_model: 'zedx'
    camera_name: 'zed_right'
    serial_number: 47753729

    base_frame: 'base_link'
    camera_frame: 'zed_right_camera_center'
    publish_tf: false
    publish_map_tf: false

    general.grab_resolution: 'HD720'
    general.grab_frame_rate: 15
    general.self_calib: true
    general.gpu_id: 0

    depth.depth_mode: 'PERFORMANCE'
    depth.min_depth: 0.3
    depth.max_depth: 20.0
    depth.depth_stabilization: 30

    video.img_downsample_factor: 1.0
    video.brightness: 4
    video.contrast: 4
    video.hue: 0
    video.saturation: 4
    video.sharpness: 4
    video.gamma: 8
    video.auto_exposure_gain: true
    video.auto_whitebalance: true

    point_cloud_freq: 5.0
    mapping.mapping_enabled: false

    sensors.publish_imu_tf: false
    sensors.sensors_image_sync: true

    use_sim_time: false
