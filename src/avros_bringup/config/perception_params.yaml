# Semantic segmentation perception parameters
#
# SegFormer-B0 (Cityscapes 19 classes) + depth projection to Nav2 obstacle cloud.
# Campus config: road + sidewalk + terrain all treated as drivable.
#
# TensorRT engine must be pre-built on the target Jetson:
#   /usr/src/tensorrt/bin/trtexec \
#     --onnx=segformer_b0.onnx --saveEngine=segformer_b0_fp16.engine --fp16

segformer_node:
  ros__parameters:
    engine_path: "/home/dinosaur/avros_models/segformer_b0_fp16.engine"
    input_topic: "/camera/camera/color/image_raw"
    output_topic: "/perception/class_mask"
    inference_height: 512
    inference_width: 1024
    publish_rate: 10.0        # Hz — process every ~3rd frame from 30fps camera

depth_projection_node:
  ros__parameters:
    mask_topic: "/perception/class_mask"
    depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    info_topic: "/camera/camera/aligned_depth_to_color/camera_info"
    output_topic: "/perception/obstacle_cloud"
    output_frame: "camera_depth_optical_frame"
    # Cityscapes class remapping for campus sidewalk driving:
    #   0 = road, 1 = sidewalk, 9 = terrain → all drivable
    #   10 = sky → ignore (not an obstacle)
    #   Everything else (building, fence, pole, person, car, vegetation...) → obstacle
    drivable_classes: [0, 1, 9]
    ignore_classes: [10]
    min_depth: 0.3            # D455 minimum reliable depth (meters)
    max_depth: 5.0            # D455 effective depth range
    downsample_factor: 4      # Process every 4th pixel for speed
